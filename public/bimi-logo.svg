<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 500">
  <title>Entre Rhône et Alpilles</title>

  <!-- Fond ivoire -->
  <rect width="500" height="500" fill="#faf9f5"/>

  <!-- Cercle or fin -->
  <circle cx="250" cy="250" r="208" fill="none"
          stroke="#c9a84c" stroke-width="2"/>

  <!-- Monogramme ERA -->
  <text x="250" y="296"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="134"
        font-weight="normal"
        fill="#243c10"
        text-anchor="middle"
        letter-spacing="22">ERA</text>

  <!-- Filet or centré sous le monogramme -->
  <line x1="172" y1="328" x2="328" y2="328"
        stroke="#c9a84c" stroke-width="1.2"/>

  <!-- Sous-titre minuscule -->
  <text x="250" y="360"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18"
        font-weight="normal"
        fill="#8c6820"
        text-anchor="middle"
        letter-spacing="6">PROVENCE</text>

</svg>

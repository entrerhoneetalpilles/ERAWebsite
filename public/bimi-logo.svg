<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 500">
  <title>Entre Rhône et Alpilles</title>

  <!-- Fond blanc -->
  <rect width="500" height="500" fill="#ffffff"/>

  <!-- Cercle doré -->
  <circle cx="250" cy="205" r="162" fill="none" stroke="#c9a84c" stroke-width="4"/>

  <!-- Tige principale -->
  <path d="M 254 368 C 250 330 246 295 248 258 C 250 220 254 188 260 162 C 263 148 267 134 272 120"
        fill="none" stroke="#8b6914" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Feuilles gauches -->
  <ellipse cx="222" cy="310" rx="38" ry="12" fill="#6b8c3a" transform="rotate(-52 222 310)"/>
  <ellipse cx="218" cy="272" rx="40" ry="12" fill="#5c7a2e" transform="rotate(-50 218 272)"/>
  <ellipse cx="220" cy="234" rx="38" ry="12" fill="#6b8c3a" transform="rotate(-46 220 234)"/>
  <ellipse cx="225" cy="196" rx="36" ry="11" fill="#5c7a2e" transform="rotate(-42 225 196)"/>
  <ellipse cx="233" cy="163" rx="33" ry="10" fill="#6b8c3a" transform="rotate(-36 233 163)"/>
  <ellipse cx="244" cy="138" rx="28" ry="9"  fill="#5c7a2e" transform="rotate(-28 244 138)"/>

  <!-- Feuilles droites -->
  <ellipse cx="278" cy="298" rx="36" ry="12" fill="#7a9f45" transform="rotate(24 278 298)"/>
  <ellipse cx="280" cy="260" rx="38" ry="12" fill="#6b8c3a" transform="rotate(20 280 260)"/>
  <ellipse cx="279" cy="220" rx="38" ry="12" fill="#7a9f45" transform="rotate(28 279 220)"/>
  <ellipse cx="277" cy="182" rx="36" ry="11" fill="#6b8c3a" transform="rotate(32 277 182)"/>
  <ellipse cx="273" cy="150" rx="32" ry="10" fill="#7a9f45" transform="rotate(28 273 150)"/>
  <ellipse cx="267" cy="126" rx="27" ry="9"  fill="#6b8c3a" transform="rotate(22 267 126)"/>

  <!-- Olives -->
  <ellipse cx="274" cy="225" rx="14" ry="16" fill="#3d6b22"/>
  <ellipse cx="270" cy="183" rx="13" ry="15" fill="#2e5518"/>
  <ellipse cx="258" cy="155" rx="12" ry="14" fill="#3d6b22"/>
  <ellipse cx="270" cy="219" rx="5" ry="6" fill="#6aaa3a" opacity="0.5"/>
  <ellipse cx="266" cy="177" rx="4" ry="5" fill="#6aaa3a" opacity="0.5"/>
  <ellipse cx="254" cy="150" rx="4" ry="5" fill="#6aaa3a" opacity="0.5"/>

  <!-- ENTRE RHONE -->
  <text x="250" y="406"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40" font-weight="bold"
        fill="#4a6b2a" text-anchor="middle" letter-spacing="4">ENTRE RH&#xD4;NE</text>

  <!-- Decorations dorees -->
  <line x1="90" y1="428" x2="148" y2="428" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
  <polygon points="153,424 163,428 153,432" fill="#c9a84c"/>
  <path d="M 108 422 C 100 418 96 428 108 428" fill="#c9a84c"/>
  <path d="M 108 434 C 100 438 96 428 108 428" fill="#c9a84c"/>
  <line x1="352" y1="428" x2="410" y2="428" stroke="#c9a84c" stroke-width="2" stroke-linecap="round"/>
  <polygon points="347,424 337,428 347,432" fill="#c9a84c"/>
  <path d="M 392 422 C 400 418 404 428 392 428" fill="#c9a84c"/>
  <path d="M 392 434 C 400 438 404 428 392 428" fill="#c9a84c"/>

  <!-- ET ALPILLES -->
  <text x="250" y="460"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="40" font-weight="bold"
        fill="#4a6b2a" text-anchor="middle" letter-spacing="4">ET ALPILLES</text>
</svg>

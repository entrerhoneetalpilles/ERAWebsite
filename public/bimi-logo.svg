<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps"
     xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 500 500">
  <title>Entre Rhône et Alpilles</title>

  <!-- Fond ivoire chaud -->
  <rect width="500" height="500" fill="#faf9f5"/>

  <!-- Cercle or — trait unique, fin -->
  <circle cx="250" cy="250" r="210" fill="none"
          stroke="#c9a84c" stroke-width="2.5"/>

  <!-- Branche d'olivier — tige -->
  <path d="M 204 348 C 232 288 258 224 296 152"
        fill="none" stroke="#8c6820" stroke-width="3.8"
        stroke-linecap="round"/>

  <!-- Feuilles gauches — 4 -->
  <ellipse cx="210" cy="322" rx="40" ry="9"
           fill="#5e8232" transform="rotate(-52 210 322)"/>
  <ellipse cx="222" cy="280" rx="40" ry="9"
           fill="#4e7228" transform="rotate(-48 222 280)"/>
  <ellipse cx="240" cy="238" rx="38" ry="9"
           fill="#5e8232" transform="rotate(-43 240 238)"/>
  <ellipse cx="260" cy="196" rx="36" ry="8.5"
           fill="#4e7228" transform="rotate(-37 260 196)"/>

  <!-- Feuilles droites — 4 -->
  <ellipse cx="262" cy="305" rx="40" ry="9"
           fill="#4e7228" transform="rotate(22 262 305)"/>
  <ellipse cx="274" cy="262" rx="40" ry="9"
           fill="#5e8232" transform="rotate(27 274 262)"/>
  <ellipse cx="284" cy="218" rx="38" ry="9"
           fill="#4e7228" transform="rotate(32 284 218)"/>
  <ellipse cx="290" cy="174" rx="36" ry="8.5"
           fill="#5e8232" transform="rotate(30 290 174)"/>

  <!-- Olives — 2 -->
  <ellipse cx="272" cy="279" rx="13" ry="16" fill="#284e10"/>
  <ellipse cx="284" cy="228" rx="12" ry="15" fill="#1e3e0c"/>
  <!-- Reflets minimalistes -->
  <ellipse cx="268" cy="272" rx="4.5" ry="5.5" fill="#72b830" opacity="0.35"/>
  <ellipse cx="280" cy="221" rx="4"   ry="5"   fill="#72b830" opacity="0.35"/>

</svg>

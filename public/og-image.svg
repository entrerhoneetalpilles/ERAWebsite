      <stop offset="0%" style="stop-color:#1a4a6e;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#2d6ea8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a7c59;stop-opacity:1" />
